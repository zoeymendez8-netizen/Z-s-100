<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z's Life OS</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0a;
--card:#181818;
--surface:#121212;
--border:#2a2a2a;
--text:#f0ece4;
--muted:#777;
--pro:#c8a96e;
--personal:#7ec8a9;
}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Mono',monospace;
margin:0;
}

header{
padding:40px 20px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
background:var(--bg);
z-index:5;
}

h1{
font-family:'Playfair Display';
margin-bottom:15px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.stat{
background:var(--surface);
padding:10px;
border:1px solid var(--border);
font-size:12px;
}

.progress{
height:6px;
background:var(--surface);
border:1px solid var(--border);
margin-bottom:15px;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,var(--pro),var(--personal));
width:0%;
transition:width 0.3s ease;
}

.tabs{
display:flex;
gap:6px;
}

.tab{
flex:1;
padding:10px;
background:var(--surface);
border:1px solid var(--border);
cursor:pointer;
color:var(--muted);
font-family:'DM Mono',monospace;
font-size:13px;
}

.tab.active{
color:white;
border-color:var(--pro);
}

main{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
display:none;
}

.section.visible{
display:block;
}

.category{
margin-bottom:20px;
}

.cat-title{
font-size:12px;
margin-bottom:6px;
color:var(--muted);
text-transform:uppercase;
letter-spacing:1px;
}

.goal{
background:var(--card);
border:1px solid var(--border);
margin-bottom:6px;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.goal-title{
flex:1;
cursor:pointer;
user-select:none;
}

.goal-title:hover{
color:var(--pro);
}

.goal-actions button{
margin-left:6px;
background:var(--surface);
border:1px solid var(--border);
color:white;
cursor:pointer;
padding:4px 8px;
font-family:'DM Mono',monospace;
font-size:12px;
}

.goal-actions button:hover{
border-color:var(--personal);
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

.modal-box{
background:var(--card);
padding:20px;
width:400px;
max-width:90%;
border:1px solid var(--border);
}

.modal-box h3{
margin-top:0;
font-family:'Playfair Display';
}

textarea{
width:100%;
height:120px;
background:black;
color:white;
border:1px solid var(--border);
font-family:'DM Mono',monospace;
font-size:13px;
padding:8px;
box-sizing:border-box;
resize:vertical;
}

.modal-box button{
margin-top:10px;
margin-right:8px;
background:var(--surface);
border:1px solid var(--border);
color:white;
cursor:pointer;
padding:6px 14px;
font-family:'DM Mono',monospace;
}

</style>
</head>

<body>

<header>

<h1>Z's 100 Goals</h1>

<div class="stats">
<div class="stat">Total<br><strong id="total"></strong></div>
<div class="stat">Progress<br><strong id="percent"></strong></div>
<div class="stat">Professional<br><strong id="pro"></strong></div>
<div class="stat">Personal<br><strong id="personal"></strong></div>
</div>

<div class="progress">
<div class="progress-fill" id="bar"></div>
</div>

<div class="tabs">
<button class="tab active" data-tab="all">All</button>
<button class="tab" data-tab="professional">Professional</button>
<button class="tab" data-tab="personal">Personal</button>
</div>

</header>

<main>
<div id="all" class="section visible"></div>
<div id="professional" class="section"></div>
<div id="personal" class="section"></div>
</main>

<div class="modal" id="modal">
<div class="modal-box">

<h3 id="modalTitle"></h3>

<textarea id="notes"></textarea>

<br>

<button onclick="saveNotes()">Save</button>
<button onclick="closeModal()">Close</button>

</div>
</div>


<script>

/* ========================
   CONFIG
======================== */

const STATES = [0, .25, .5, 1];

const ICONS = {
  0:   "○",
  .25: "◔",
  .5:  "◑",
  1:   "●"
};

/* ========================
   DATA STORAGE
======================== */

let state = JSON.parse(localStorage.getItem("goalState") || "{}");
let notesData = JSON.parse(localStorage.getItem("goalNotes") || "{}");

let currentGoal = null;

function save() {
  localStorage.setItem("goalState", JSON.stringify(state));
  localStorage.setItem("goalNotes", JSON.stringify(notesData));
  updateStats();
}

/* ========================
   PROGRESS TOGGLE
======================== */

function toggle(id) {
  let current = state[id] || 0;
  let index = STATES.indexOf(current);
  state[id] = STATES[(index + 1) % 4];
  save();
  render();
}

/* ========================
   NOTES MODAL
======================== */

function openModal(id, title) {
  currentGoal = id;
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("notes").value = notesData[id] || "";
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function saveNotes() {
  notesData[currentGoal] = document.getElementById("notes").value;
  save();
  closeModal();
}

/* ========================
   STATS ENGINE
======================== */

function updateStats() {
  let proTotal = 0;
  let personalTotal = 0;

  Object.keys(state).forEach(id => {
    let val = state[id];
    if (id.startsWith("professional")) {
      proTotal += val;
    } else if (id.startsWith("personal")) {
      personalTotal += val;
    }
  });

  let total = Math.min(proTotal + personalTotal, 100);

  document.getElementById("bar").style.width = total + "%";
  document.getElementById("total").innerText = total.toFixed(1) + "/100";
  document.getElementById("percent").innerText = Math.round(total) + "%";
  document.getElementById("pro").innerText = proTotal.toFixed(1) + "/50";
  document.getElementById("personal").innerText = personalTotal.toFixed(1) + "/50";
}

/* ========================
   GOALS DATASET
======================== */

const goals = {

  professional: {

    HR: [
      "Complete HR certification",
      "Create onboarding playbook",
      "Write people ops policy",
      "Lead training session",
      "Design engagement survey",
      "Study Portuguese labor law",
      "Secure HR role Portugal",
      "Shadow HRBP",
      "Interview 5 HR professionals",
      "Attend HR event",
      "Get recommendation letter",
      "Build HR toolkit"
    ],

    Operations: [
      "Map business process",
      "Learn Notion/Airtable",
      "Manage project end-to-end",
      "Build SOP library",
      "Run retrospective",
      "Learn SQL basics",
      "Vendor evaluation framework",
      "Shadow operations manager",
      "Shadow finance/product/strategy role",
      "Implement measurable process improvement",
      "Build capacity planning model",
      "Apply operations metrics",
      "Network into ops opportunity"
    ],

    RealEstate: [
      "Read 5 real estate books",
      "Analyze 50 deals",
      "Build net worth tracker",
      "Save down payment fund",
      "Meet 3 investors",
      "Research Portugal markets",
      "Learn BRRRR strategy",
      "Connect with RE attorney",
      "Build 6-month emergency fund",
      "Reach $500 passive income",
      "Learn cap rate / IRR",
      "Maintain 30% savings rate"
    ],

    Brand: [
      "Launch personal website",
      "Start professional blog",
      "Publish 10 LinkedIn posts",
      "Reach 500 LinkedIn connections",
      "Build 100-person email list",
      "Create brand style guide",
      "Do public speaking event",
      "Land freelance advisory work"
    ],

    Big5: [
      "Shadow 50–100 professionals",
      "Build $100/mo income asset",
      "Secure HR/ops role before 25",
      "Close first real estate deal",
      "Publish 1000+ view article"
    ]

  },

  personal: {

    Health: [
      "90-day workout routine",
      "Learn 15 healthy meals",
      "Run 5K challenge",
      "Sleep consistency month",
      "Reduce draining habit",
      "72-hour digital detox",
      "Morning routine habit",
      "Try new sport"
    ],

    Mind: [
      "Read 24 books",
      "Learn conversational Portuguese",
      "Take curiosity course",
      "Journal 6 months",
      "Study philosophy deeply",
      "Learn second EU language",
      "Memorize meaningful passage"
    ],

    Relationships: [
      "Build Portugal friend group",
      "Write letters to 5 people",
      "Weekly relationship check-in",
      "Host intentional gathering",
      "Reconnect with 3 people",
      "Find life mentor",
      "Join Portugal community",
      "Practice vulnerability"
    ],

    Travel: [
      "Take solo trip",
      "2-week slow city stay",
      "Navigate without maps",
      "3-country road trip",
      "Try unfamiliar food each country",
      "Spend off-grid week",
      "Document travel honestly",
      "Revisit meaningful location"
    ],

    Money: [
      "Prototype ideal weekly schedule",
      "3-month strict budget",
      "Remove unnecessary expense",
      "Build 1-year roadmap",
      "Define 'enough'",
      "Align spending with values",
      "Reduce money anxiety"
    ],

    Identity: [
      "Write personal manifesto",
      "Face biggest fear",
      "Say no to misalignment",
      "Build 20-year identity habit",
      "Do something purely joyful",
      "Release outdated identity",
      "Monthly personal review habit"
    ],

    Big5: [
      "Visit 50 countries + Antarctica OR 100 total",
      "Join marine conservation effort",
      "Earn pilot license or hours",
      "Maintain 1000-day habit streak",
      "Create legacy project"
    ]

  }

};

/* ========================
   RENDER ENGINE
======================== */

function renderTab(tab) {
  let root = document.getElementById(tab);
  root.innerHTML = "";

  let source =
    tab === "professional" ? goals.professional :
    tab === "personal"     ? goals.personal :
    { ...goals.professional, ...goals.personal };

  const proCategories = new Set(Object.keys(goals.professional));

  Object.entries(source).forEach(([cat, items]) => {

    let wrap = document.createElement("div");
    wrap.className = "category";

    let title = document.createElement("div");
    title.className = "cat-title";
    title.innerText = cat;
    wrap.appendChild(title);

    let prefix = tab !== "all"
      ? tab
      : proCategories.has(cat) ? "professional" : "personal";

    items.forEach((goal, i) => {

      let id = prefix + "-" + cat + "-" + i;

      let row = document.createElement("div");
      row.className = "goal";

      let label = document.createElement("div");
      label.className = "goal-title";
      label.innerText = goal + "  " + ICONS[state[id] || 0];
      label.onclick = () => { toggle(id); };

      let actions = document.createElement("div");
      actions.className = "goal-actions";

      let noteBtn = document.createElement("button");
      noteBtn.innerText = "Notes";
      noteBtn.onclick = () => openModal(id, goal);

      actions.appendChild(noteBtn);
      row.appendChild(label);
      row.appendChild(actions);
      wrap.appendChild(row);
    });

    root.appendChild(wrap);
  });
}

function render() {
  renderTab("all");
  renderTab("professional");
  renderTab("personal");
  updateStats();
}

render();

document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll(".section").forEach(s => s.classList.remove("visible"));
    document.getElementById(tab.dataset.tab).classList.add("visible");
  };
});

</script>

</body>
</html>
