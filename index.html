<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z's Life OS</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0a;
--card:#181818;
--surface:#121212;
--border:#2a2a2a;
--text:#f0ece4;
--muted:#777;
--pro:#c8a96e;
--personal:#7ec8a9;
}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Mono',monospace;
margin:0;
}

header{
padding:40px 20px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
background:var(--bg);
z-index:5;
}

h1{
font-family:'Playfair Display';
margin-bottom:15px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:15px;
}

.stat{
background:var(--surface);
padding:10px;
border:1px solid var(--border);
font-size:12px;
}

.progress{
height:6px;
background:var(--surface);
border:1px solid var(--border);
margin-bottom:15px;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,var(--pro),var(--personal));
width:0%;
}

.tabs{
display:flex;
gap:6px;
}

.tab{
flex:1;
padding:10px;
background:var(--surface);
border:1px solid var(--border);
cursor:pointer;
}

.tab.active{
color:white;
}

main{
max-width:900px;
margin:auto;
padding:20px;
}

.section{
display:none;
}

.section.visible{
display:block;
}

.category{
margin-bottom:20px;
}

.cat-title{
font-size:12px;
margin-bottom:6px;
color:var(--muted);
text-transform:uppercase;
letter-spacing:1px;
}

.goal{
background:var(--card);
border:1px solid var(--border);
margin-bottom:6px;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.goal-title{
flex:1;
cursor:pointer;
}

.goal-actions button{
margin-left:6px;
background:var(--surface);
border:1px solid var(--border);
color:white;
cursor:pointer;
padding:4px 8px;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:var(--card);
padding:20px;
width:400px;
max-width:90%;
}

textarea{
width:100%;
height:120px;
background:black;
color:white;
border:1px solid var(--border);
}

</style>
</head>

<body>

<header>

<h1>Z's 100 Goals</h1>

<div class="stats">
<div>Total<br><strong id="totalDisplay"></strong></div>
<div>Progress<br><strong id="percent"></strong></div>
<div>Professional<br><strong id="proDisplay"></strong></div>
<div>Personal<br><strong id="personalDisplay"></strong></div>
</div>

<div class="progress">
<div class="progress-fill" id="bar"></div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('all',this)">All</button>
<button class="tab" onclick="switchTab('professional',this)">Professional</button>
<button class="tab" onclick="switchTab('personal',this)">Personal</button>
</div>

</header>

<main>
<div id="all" class="section visible"></div>
<div id="professional" class="section"></div>
<div id="personal" class="section"></div>
</main>


<div class="modal" id="modal">
<div class="modal-box">

<h3 id="modalTitle"></h3>

<textarea id="notesField"></textarea>

<br>

<button onclick="saveNotes()">Save</button>
<button onclick="closeModal()">Close</button>

</div>
</div>


<script>

const STATES=[0,.25,.5,1]

const ICONS={
0:"○",
.25:"◔",
.5:"◑",
1:"●"
}

let state=JSON.parse(localStorage.getItem("goalState")||"{}")
let notes=JSON.parse(localStorage.getItem("goalNotes")||"{}")

let currentGoal=null


function save(){

localStorage.setItem("goalState",JSON.stringify(state))
localStorage.setItem("goalNotes",JSON.stringify(notes))

updateStats()

}


function toggle(id){

let current=state[id]||0

let index=STATES.indexOf(current)

state[id]=STATES[(index+1)%4]

save()

render()

}


function openModal(id,title){

currentGoal=id

modalTitle.innerText=title

notesField.value=notes[id]||""

modal.style.display="flex"

}


function closeModal(){

modal.style.display="none"

}


function saveNotes(){

notes[currentGoal]=notesField.value

save()

closeModal()

}


/* ================= STATS ENGINE ================= /

function updateStats(){

let total=0
let pro=0
let personal=0

Object.entries(state).forEach(([id,val])=>{

total+=val

if(id.includes("professional"))

pro+=val
else
personal+=val

})

bar.style.width=total+"%"

totalDisplay.innerText=total.toFixed(1)+"/100"

percent.innerText=Math.round(total)+"%"

proDisplay.innerText=(pro2).toFixed(1)+"/50"

personalDisplay.innerText=(personal2).toFixed(1)+"/50"

}


/ ================= GOALS DATA ================= /

const goals = {

professional:{

HR:["Goal placeholder"],

Operations:["Goal placeholder"],

RealEstate:["Goal placeholder"],

Brand:["Goal placeholder"],

Big5:["Goal placeholder"]

},

personal:{

Health:["Goal placeholder"],

Mind:["Goal placeholder"],

Relationships:["Goal placeholder"],

Travel:["Goal placeholder"],

Money:["Goal placeholder"],

Identity:["Goal placeholder"],

Big5:["Goal placeholder"]

}

}


/ ================= RENDER ENGINE ================= */

function renderSection(root,sectionName){

Object.entries(goals[sectionName]).forEach(([cat,items])=>{

let wrap=document.createElement("div")
wrap.className="category"

let title=document.createElement("div")
title.className="cat-title"
title.innerText=cat

wrap.appendChild(title)

items.forEach((goal,i)=>{

let id=sectionName+"-"+cat+"-"+i

let row=document.createElement("div")
row.className="goal"

let label=document.createElement("div")
label.className="goal-title"
label.innerText=goal+" "+ICONS[state[id]||0]

label.onclick=()=>toggle(id)

let noteBtn=document.createElement("button")

noteBtn.innerText="Notes"

noteBtn.onclick=()=>openModal(id,goal)

row.appendChild(label)
row.appendChild(noteBtn)

wrap.appendChild(row)

})

root.appendChild(wrap)

})

}


function render(){

["all","professional","personal"].forEach(tab=>{

document.getElementById(tab).innerHTML=""

})

renderSection(all,"professional")
renderSection(all,"personal")

renderSection(professional,"professional")
renderSection(personal,"personal")

updateStats()

}


function switchTab(name,btn){

document.querySelectorAll(".section").forEach(x=>x.classList.remove("visible"))

document.getElementById(name).classList.add("visible")

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))

btn.classList.add("active")

}


render()

</script>

</body>
</html>
